<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Main eye shape -->
  <path d="M100 40 C60 40 30 70 30 100 C30 130 60 160 100 160 C140 160 170 130 170 100 C170 70 140 40 100 40 Z" 
        fill="white" stroke="url(#grad1)" stroke-width="4"/>
  
  <!-- Inner eye -->
  <ellipse cx="100" cy="100" rx="35" ry="35" fill="url(#grad1)"/>
  
  <!-- Pupil -->
  <circle cx="100" cy="100" r="15" fill="white"/>
  
  <!-- Data points around eye -->
  <circle cx="100" cy="25" r="5" fill="url(#grad2)"/>
  <circle cx="155" cy="55" r="4" fill="url(#grad2)"/>
  <circle cx="170" cy="100" r="5" fill="url(#grad2)"/>
  <circle cx="155" cy="145" r="4" fill="url(#grad2)"/>
  <circle cx="100" cy="175" r="5" fill="url(#grad2)"/>
  <circle cx="45" cy="145" r="4" fill="url(#grad2)"/>
  <circle cx="30" cy="100" r="5" fill="url(#grad2)"/>
  <circle cx="45" cy="55" r="4" fill="url(#grad2)"/>
  
  <!-- Connection lines -->
  <line x1="100" y1="30" x2="100" y2="65" stroke="url(#grad2)" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="60" x2="130" y2="80" stroke="url(#grad2)" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="140" x2="130" y2="120" stroke="url(#grad2)" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="170" x2="100" y2="135" stroke="url(#grad2)" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="140" x2="70" y2="120" stroke="url(#grad2)" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="60" x2="70" y2="80" stroke="url(#grad2)" stroke-width="1.5" opacity="0.6"/>
</svg>